version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"

    groups:
      dependencies:
        dependency-type: "production"
      devDependencies:
        dependency-type: "development"

  - package-ecosystem: "npm"
    directory: "/npm-wrapper"
    schedule:
      interval: "weekly"

    groups:
      dependencies:
        dependency-type: "production"
      devDependencies:
        dependency-type: "development"
