name: Release

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true

  build-and-upload:
    name: Build ${{ matrix.name }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: huskybc-x86_64-linux

          # Linux aarch64 (ARM 64-bit)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: huskybc-aarch64-linux

          # macOS x86_64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            name: huskybc-x86_64-macos

          # macOS aarch64 (Apple Silicon - M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            name: huskybc-aarch64-macos

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            name: huskybc-x86_64-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/huskybc ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/huskybc.exe ${{ matrix.name }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
