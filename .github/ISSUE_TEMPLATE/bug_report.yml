name: Bug Report
description: Report a bug to help us improve HuskyBC
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you running?
      options:
        - macOS
        - Windows
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Other Linux
        - WSL
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: What version of the OS?
      placeholder: "e.g., macOS 13.2, Windows 11, Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal/Shell
      description: What terminal or shell are you using?
      placeholder: "e.g., bash, zsh, PowerShell, Command Prompt, iTerm2"
    validations:
      required: true

  - type: input
    id: cli-version
    attributes:
      label: HuskyBC Version
      description: Output of `huskybc --version`
      placeholder: "e.g., huskybc v0.1.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: If applicable, output of `node --version`
      placeholder: "e.g., v18.15.0"

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run command `huskybc --init`
        2. In directory `/path/to/project`
        3. Select option '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste the complete error output here
      render: shell
      placeholder: Paste error output here
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Tell us what you expected
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or logs about the problem here
      placeholder: Any additional information
